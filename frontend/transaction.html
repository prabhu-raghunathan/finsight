<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinSight — Transaction</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <span class="brand">FinSight</span>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="transaction.html">Add Transaction</a>
    <a href="ai-chat.html">AI Chat</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</nav>

<div class="container" style="max-width: 600px;">
  <div class="page-header">
    <h1 id="pageTitle">Add Transaction</h1>
    <p>Fill in the details below</p>
  </div>

  <div class="form-card">
    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" placeholder="e.g. Grocery shopping at DMart" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="amount">Amount (₹)</label>
        <input type="number" id="amount" placeholder="0" step="1" min="0" />
      </div>
      <div class="form-group">
        <label for="type">Type</label>
        <select id="type">
          <option value="EXPENSE">Expense</option>
          <option value="INCOME">Income</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Category</label>
        <input type="text" id="category" placeholder="e.g. Food, Salary, Rent" />
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" />
      </div>
    </div>

    <div class="form-actions">
      <button class="btn" id="submitBtn">Save Transaction</button>
      <a href="dashboard.html" class="btn-ghost">Cancel</a>
    </div>

    <div class="msg error"   id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/transaction.js"></script>
</body>
</html>
